project_name: usque
version: 2

builds:
  - id: windows
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - "-s -w"
      - "-X github.com/Diniboy1123/usque/cmd.version={{.Tag}}"
      - "-X github.com/Diniboy1123/usque/cmd.commit={{.Commit}}"
      - "-X github.com/Diniboy1123/usque/cmd.date={{.Date}}"

archives:
  - formats:
    - zip
    name_template: "usque_{{.Version}}_{{.Os}}_{{.Arch}}{{if .Arm}}v{{.Arm}}{{end}}"
    files:
      - LICENSE.md
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: postmasta
    name: Diniboy1123-usque
