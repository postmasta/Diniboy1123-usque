name: Build and Release - WIN

on:
  #push:
  #  tags:
  #    - 'v*'
  workflow_dispatch:  # Allows manual triggering

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for GitHub Releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

     # - name: Set up Go
     #   uses: actions/setup-go@v6 # v5
     #   with:
     #     go-version: 1.25.5
     #     go-download-base-url: 'https://github.com/XTLS/go-win7/releases/download/patched-1.25.5/'

      - name: Install Custom Go (Win7 patched)
        run: |
          curl -L https://github.com/XTLS/go-win7/releases/download/patched-1.25.5/go-for-win7-linux-amd64.zip -o go-custom.zip

          mkdir -p custom_go
          unzip -q go-custom.zip -d ./custom_go
          
          echo "$(pwd)/custom_go/bin" >> $GITHUB_PATH
          echo "GOROOT=$(pwd)/custom_go" >> $GITHUB_ENV

          #go run hello.go
          echo "$(pwd)"
          go version
          cd "$(pwd)/custom_go/bin"
          echo "$(pwd)"
          go version

      - name: Install GoReleaser
        run: |
          curl -sL https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Linux_x86_64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/goreleaser /usr/local/bin/

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: goreleaser release --clean
